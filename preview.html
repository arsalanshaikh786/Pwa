<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp API Tester</title>

<style>
body{
    font-family:Arial,sans-serif;
    max-width:600px;
    margin:30px auto;
    padding:20px;
}
input,textarea{
    width:100%;
    padding:10px;
    margin:8px 0;
}
button{
    padding:12px 20px;
    cursor:pointer;
}
#result{
    margin-top:20px;
    padding:15px;
    border:1px solid #ccc;
    white-space:pre-wrap;
}
</style>
</head>
<body>

<h2>WhatsApp API Test</h2>

<input id="apiKey" placeholder="API Key">

<input id="sessionId" placeholder="Session ID">

<input id="number" placeholder="919876543210">

<textarea id="message">Hello from test page</textarea>

<button onclick="sendMessage()">Send Message</button>

<div id="result">Response will appear here...</div>

<script>
async function sendMessage(){

    const result = document.getElementById("result");

    result.textContent = "Sending...";

    try{

        const response = await fetch(
            "https://api.wireweb.co.in/v1/messages/send",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json",
                    "X-API-Key":document.getElementById("apiKey").value
                },
                body:JSON.stringify({
                    session_id:document.getElementById("sessionId").value,
                    to:document.getElementById("number").value,
                    type:"text",
                    message:document.getElementById("message").value
                })
            }
        );

        const text = await response.text();

        result.textContent =
`HTTP Status: ${response.status}

${text}`;

    }catch(err){

        result.textContent =
`ERROR

${err.message}

Possible causes:
- CORS blocked
- Invalid API endpoint
- Session disconnected
- Internet issue`;

        console.error(err);
    }
}
</script>

</body>
</html>
